<div class="wrap topnav-container">
  <div class="topnav-logo">
    <a href="{{ '/' | relative_url }}" aria-label="Sedifex Blog home">
      <span class="logo-mark">S</span>
      <span>{{ site.title }}</span>
    </a>
  </div>
  <button class="topnav-toggle" aria-expanded="false" aria-label="Menu">&#9776;</button>
  <nav class="topnav" aria-label="Main navigation">
    <ul class="topnav-list">
      <li class="{% if page.url == '/' %}active{% endif %}">
        <a href="{{ '/' | relative_url }}">Home</a>
      </li>
      <li class="{% if page.url == '/blogs/' %}active{% endif %}">
        <a href="{{ '/blogs/' | relative_url }}">Articles</a>
      </li>
      <li class="{% if page.url == '/search/' %}active{% endif %}">
        <a href="{{ '/search/' | relative_url }}">Search</a>
      </li>
      <li>
        <a href="https://www.sedifexmarket.com" target="_blank" rel="noopener">Market</a>
      </li>
      <li>
        <a href="https://pay.sedifex.com" target="_blank" rel="noopener">Pay</a>
      </li>
      <li>
        <a class="nav-cta" href="https://www.sedifex.com" target="_blank" rel="noopener">Start selling</a>
      </li>
      <li>
        <button id="theme-toggle" type="button">Dark</button>
      </li>
    </ul>
  </nav>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var toggle = document.querySelector('.topnav-toggle');
    var list = document.querySelector('.topnav-list');
    if (toggle && list) {
      toggle.addEventListener('click', function() {
        var expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', (!expanded).toString());
        list.classList.toggle('open');
      });
    }
  });
</script>
